name: Build SafeWatch AI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-all:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK (For Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets (Vite)
        run: npm run build

      # --- ANDROID BUILD STEPS ---
      - name: Setup Android Platform
        run: |
          # If android folder doesn't exist, add it
          if [ ! -d "android" ]; then
            echo "Android folder not found. Adding platform..."
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeWatch-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # --- WINDOWS BUILD STEPS (Cross-Compile on Linux) ---
      # Note: Building Windows on Linux works for NSIS but requires wine implicitly or proper electron-builder config.
      # However, for stability, we often split jobs. But here we try to keep it simple.
      # If this fails, we will split into a 'windows-latest' job.
      
  build-windows:
    name: Build Windows Desktop
    needs: build-all # Wait for web build verification (optional, can run parallel)
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App (Windows .exe)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: SafeWatch-Windows-Setup
          path: release/*.exe

  publish-release:
    name: Publish GitHub Release
    needs: [build-all, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeWatch-Android-APK
          path: artifacts/android

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeWatch-Windows-Setup
          path: artifacts/windows

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          
          # Copy Android APK and rename for clean presentation
          if [ -f "artifacts/android/app-debug.apk" ]; then
            cp "artifacts/android/app-debug.apk" "release-assets/SafeWatch-Android.apk"
            echo "Android APK successfully copied."
          else
            echo "Android compilation artifact not found!"
          fi
          
          # Copy Windows Installer and rename for clean presentation
          shopt -s nullglob
          win_installer=(artifacts/windows/*.exe)
          if [ ${#win_installer[@]} -gt 0 ]; then
            cp "${win_installer[0]}" "release-assets/SafeWatch-Windows-Setup.exe"
            echo "Windows Installer successfully copied: ${win_installer[0]}"
          else
            echo "Windows compilation artifact not found!"
          fi

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking GH CLI version and authorization..."
          gh --version
          
          # Let's create the release notes content cleanly in a file using echo to prevent YAML parsing and escaping issues
          echo "This snapshot contains the latest live automated builds of the **SafeWatch AI** system for Windows and Android, compiled on every push to the main branch." > release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "### 📥 Download Links" >> release-notes.md
          echo "* **[Android Mobile App (.apk)](${{ github.server_url }}/${{ github.repository }}/releases/download/latest-build/SafeWatch-Android.apk)**" >> release-notes.md
          echo "* **[Windows Desktop Installer (.exe)](${{ github.server_url }}/${{ github.repository }}/releases/download/latest-build/SafeWatch-Windows-Setup.exe)**" >> release-notes.md
          echo "" >> release-notes.md
          echo "*Please download, transfer to your device, and proceed with standard installation procedures.*" >> release-notes.md
          
          # Create tag and release if not exists, then overwrite/upload assets
          # Uses rolling tag 'latest-build' so users always download the newest version on each push.
          gh release create latest-build \
            --title "SafeWatch AI - Latest Desktop & Mobile Builds" \
            --notes-file release-notes.md \
            --prerelease || true
            
          echo "Uploading compiled release binaries..."
          gh release upload latest-build release-assets/* --clobber