name: Build SafeWatch AI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  prepare-version:
    name: Bump Version & Sync Git
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
         # Runs our custom bumper script which analyzes commit message for major/minor/patch bump
        id: bump
        run: node electron/bump-version.js

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          
          # Only commit and push if package.json has changed
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
            git push origin HEAD:main || echo "Push failed, continuing with in-memory bump."
          else
            echo "No version changes detected."
          fi

  build-all:
    name: Build Web & Android
    needs: prepare-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # Force checkout of main branch to get the bumped version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK (For Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets (Vite)
        run: npm run build

      # --- ANDROID BUILD STEPS ---
      - name: Setup Android Platform
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder not found. Adding platform..."
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeWatch-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Build Windows Desktop
    needs: prepare-version
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # Force checkout of main branch to get the bumped version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App (Windows .exe & latest.yml)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: SafeWatch-Windows-Setup
          path: |
            release/*.exe
            release/latest.yml

  publish-release:
    name: Publish GitHub Release
    needs: [prepare-version, build-all, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeWatch-Android-APK
          path: artifacts/android

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeWatch-Windows-Setup
          path: artifacts/windows

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          
          # Copy Android APK with version tag
          if [ -f "artifacts/android/app-debug.apk" ]; then
            cp "artifacts/android/app-debug.apk" "release-assets/SafeWatch-Android-v${{ needs.prepare-version.outputs.new_version }}.apk"
            echo "Android APK successfully copied with version tag."
          else
            echo "Android compilation artifact not found!"
          fi
          
          # Copy all Windows exact setup binaries & latest.yml for auto-update to function
          if [ -d "artifacts/windows" ]; then
            cp -r artifacts/windows/* release-assets/
            echo "Windows Installer files and latest.yml metadata successfully copied."
          else
            echo "Windows compilation artifacts directory not found!"
          fi

      - name: Create unique GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking GH CLI version and authorization..."
          gh --version
          
          # Create Release Notes describing version bump
          echo "### 🚀 SafeWatch AI Release v${{ needs.prepare-version.outputs.new_version }}" > release-notes.md
          echo "Automated cross-compiled release of the **SafeWatch AI** system for Windows Desktop and Android Mobile." >> release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "### 📥 Direct Downloads" >> release-notes.md
          echo "* **[Android Mobile App (.apk)](${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ needs.prepare-version.outputs.new_version }}/SafeWatch-Android-v${{ needs.prepare-version.outputs.new_version }}.apk)**" >> release-notes.md
          
          # Look for Windows exe name to build exact download links
          shopt -s nullglob
          win_files=(release-assets/*.exe)
          if [ ${#win_files[@]} -gt 0 ]; then
            exe_name=$(basename "${win_files[0]}")
            echo "* **[Windows Desktop Installer (.exe)](${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ needs.prepare-version.outputs.new_version }}/$exe_name)**" >> release-notes.md
          fi
          
          echo "" >> release-notes.md
          echo "*This release supports in-app auto-updates for existing desktop installations.*" >> release-notes.md
          
          # Create uniquely versioned tag and release
          gh release create "v${{ needs.prepare-version.outputs.new_version }}" \
            --title "SafeWatch AI - v${{ needs.prepare-version.outputs.new_version }}" \
            --notes-file release-notes.md \
            --prerelease=false || true
            
          echo "Uploading versioned release binaries..."
          gh release upload "v${{ needs.prepare-version.outputs.new_version }}" release-assets/* --clobber
