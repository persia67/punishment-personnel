<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Intelligent monitoring system</title>
    <link rel="icon" type="image/png" href="app_icon_new_1783848679437.png" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      
      /* Utilities */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      
      /* Mobile optimizations */
      input, select, textarea {
        font-size: 16px; /* Prevents zoom on iOS */
      }
      @media (min-width: 768px) {
        input, select, textarea {
          font-size: 0.875rem; /* 14px on desktop */
        }
      }
    </style>
  </head>
  <body>
    <!-- Diagnostic Error Overlay -->
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); color:#f87171; font-family:monospace; padding:30px; z-index:999999; overflow:auto; text-align:left;" dir="ltr">
      <h2 style="color:#ef4444; font-size:1.5rem; margin-bottom:15px; font-weight:bold;">⚠️ Application Runtime Error Detected</h2>
      <p style="color:#94a3b8; margin-bottom:20px; font-size:0.9rem;">The application crashed on load. Read the trace information below to resolve the issue:</p>
      <hr style="border-color:#334155; margin-bottom:20px;"/>
      <pre id="error-message" style="background:#0f172a; padding:15px; border-radius:8px; border:1px solid #1e293b; white-space:pre-wrap; font-size:0.85rem; line-height:1.5; color:#f8fafc; font-weight:bold;"></pre>
      <button onclick="window.location.reload(true)" style="margin-top:20px; background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">Force Reload App</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var overlay = document.getElementById('error-overlay');
        var msg = document.getElementById('error-message');
        if (overlay && msg) {
          overlay.style.display = 'block';
          msg.textContent += '\nError: ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno + '\nStack: ' + (e.error ? e.error.stack : 'No stacktrace available') + '\n──────────────────────────────────────────────────';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var overlay = document.getElementById('error-overlay');
        var msg = document.getElementById('error-message');
        if (overlay && msg) {
          overlay.style.display = 'block';
          msg.textContent += '\nUnhandled Promise Rejection: ' + e.reason + (e.reason && e.reason.stack ? '\nStack: ' + e.reason.stack : '') + '\n──────────────────────────────────────────────────';
        }
      });
    </script>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
